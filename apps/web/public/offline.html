<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — BookendsShiftly</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1020; color: #e5e9f5; padding: 24px;
      }
      .card { text-align: center; max-width: 340px; }
      .badge {
        width: 64px; height: 64px; border-radius: 16px; margin: 0 auto 20px;
        display: grid; place-items: center; background: #2563eb; color: #fff;
        font-weight: 900; font-size: 32px;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #9aa4c0; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
      button {
        background: #2563eb; color: #fff; border: 0; border-radius: 12px;
        padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">B</div>
      <h1>You're offline</h1>
      <p>BookendsShiftly needs a connection to load this page. Check your network and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
