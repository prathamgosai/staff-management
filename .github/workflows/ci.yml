name: CI

# Quality gate for every change headed to main. Render only runs install+build on
# deploy, so this is the sole place lint / typecheck / unit tests actually run.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint • typecheck • test • build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # pnpm must be installed before setup-node so its cache can key on the lockfile.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Match the project's supported range (>=20 <23). Node 24 breaks the Next dev
          # bundler; keep CI on the same major the app is developed and deployed on.
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
