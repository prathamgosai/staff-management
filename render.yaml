# ─────────────────────────────────────────────────────────────
# Render Blueprint — WorkforceIQ
#   Database : Supabase  (external — session pooler)
#   Redis    : Upstash or Render Key Value (external)
#   Hosted here: NestJS API + Next.js Web
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# Every `sync: false` var is filled in the Render dashboard (kept out of git).
# ─────────────────────────────────────────────────────────────
services:
  # ── NestJS API ─────────────────────────────────────────────
  - type: web
    name: workforceiq-api
    runtime: node
    plan: free
    branch: main
    buildCommand: corepack enable && pnpm install --prod=false && pnpm --filter @workforceiq/shared build && pnpm --filter @workforceiq/api build
    startCommand: pnpm --filter @workforceiq/api start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api/v1
      # ── Supabase (session pooler) — fill in dashboard ──
      - key: DB_HOST
        sync: false          # aws-0-<region>.pooler.supabase.com
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        sync: false          # postgres.ypgkyytgpszlfhosolec
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_POOL_MAX
        value: "12"          # free Supabase Nano has few backends — keep modest
      # ── Redis (Upstash / Render Key Value) — fill in dashboard ──
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TLS
        value: "true"          # Upstash requires TLS
      # ── Auth (Render generates strong secrets) ──
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # ── CORS: set to the web service URL after first deploy ──
      - key: APP_URL
        sync: false          # https://workforceiq-web.onrender.com

  # ── Next.js Web ────────────────────────────────────────────
  - type: web
    name: workforceiq-web
    runtime: node
    plan: free
    branch: main
    buildCommand: corepack enable && pnpm install --prod=false && pnpm --filter @workforceiq/shared build && pnpm --filter @workforceiq/web build
    startCommand: pnpm --filter @workforceiq/web start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # NEXT_PUBLIC_* are baked in at BUILD time — set them before the first build,
      # and re-deploy the web service if the API URL changes later.
      - key: NEXT_PUBLIC_API_URL
        sync: false          # https://workforceiq-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_WS_URL
        sync: false          # wss://workforceiq-api.onrender.com
      - key: NEXT_PUBLIC_APP_NAME
        value: WorkforceIQ
