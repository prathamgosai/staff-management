# ─────────────────────────────────────────────────────────────
# Render Blueprint — WorkforceIQ (SINGLE COMBINED SERVICE)
#   One Render web service runs BOTH the Next.js web and the NestJS API via
#   scripts/start-render.mjs. The web listens on Render's public $PORT and
#   proxies /api/* to the co-located API on 127.0.0.1:4000 (no CORS, no second
#   service to keep warm or get suspended). This replaces the old two-service
#   split (separate bookends-shiftly API), which is what caused login 503s when
#   the API service was suspended.
#
#   Database : Supabase (Sydney, ap-southeast-2) · external · session pooler
#   Redis    : optional (Render Key Value). App degrades gracefully without it.
#
# Set by hand in the Render dashboard (sync:false):
#   • DB_PASSWORD  = your Supabase DB password (Supabase → Connect → Session pooler)
# ─────────────────────────────────────────────────────────────

services:
  # ── Optional Redis (Render Key Value). Remove this block to run without it. ──
  - type: keyvalue
    name: workforceiq-redis
    plan: free
    region: singapore
    ipAllowList: []               # empty = reachable only from within Render
    maxmemoryPolicy: noeviction   # required by Bull (must not evict jobs)

  # ── Combined Web + API (one service) ───────────────────────
  - type: web
    name: workforceiq
    runtime: node
    plan: free
    region: singapore
    branch: main
    # Build shared + API + web (the combined launcher needs all three built).
    buildCommand: corepack enable && pnpm install --prod=false && pnpm --filter @workforceiq/shared build && pnpm --filter @workforceiq/api build && pnpm --filter @workforceiq/web build
    # One process manager launches the API (internal :4000) then the web ($PORT).
    startCommand: node scripts/start-render.mjs
    # The web proxies this through to the co-located API.
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api/v1
      - key: INTERNAL_API_PORT
        value: "4000"             # the co-located API's internal port (start-render.mjs)
      # ── Postgres — YOUR Supabase project (Sydney, session pooler) ──
      - key: DB_HOST
        value: aws-1-ap-southeast-2.pooler.supabase.com
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres.ypgkyytgpszlfhosolec
      - key: DB_PASSWORD
        sync: false               # ← paste your Supabase DB password in the dashboard
      - key: DB_SSL
        value: "true"
      - key: DB_POOL_MAX
        value: "8"                # modest for Supabase free tier + session pooler
      # ── Auth ──
      - key: JWT_SECRET
        generateValue: true       # Render generates a strong secret (or set your own)
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # ── Redis (optional — wired from the Key Value service above) ──
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: workforceiq-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: workforceiq-redis
          property: port
      - key: REDIS_TLS
        value: "false"
      # ── CORS: the browser stays same-origin (proxy), but set this to the
      #    service's own public URL so any direct API call is allowed too. ──
      - key: APP_URL
        sync: false               # e.g. https://staff-management-yf21.onrender.com
